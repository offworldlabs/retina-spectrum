name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g., v0.1.0, dev)"
        required: true
        default: dev
      publish:
        description: "Push to GHCR?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "publish=${{ inputs.publish }}" >> $GITHUB_OUTPUT
          fi

      - name: Build retina-spectrum
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.version.outputs.publish == 'true' }}
          tags: ghcr.io/offworldlabs/retina-spectrum:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/offworldlabs/retina-spectrum:cache
          cache-to: type=registry,ref=ghcr.io/offworldlabs/retina-spectrum:cache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
