<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retina-spectrum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111827;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 20px;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
  }

  header h1  { font-size: 0.95rem; letter-spacing: 0.15em; color: #94a3b8; }
  #status    { font-size: 0.8rem; color: #64748b; }

  .legend { display: flex; gap: 16px; margin-left: auto; font-size: 0.78rem; color: #94a3b8; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #chart-wrap { flex: 1; padding: 12px 20px 14px; min-height: 0; }
  canvas { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<header>
  <h1>retina-spectrum</h1>
  <span id="status">initialising…</span>
  <div class="legend">
    <span><span class="dot" style="background:#4fc3f7"></span>FM 88–108 MHz</span>
    <span><span class="dot" style="background:#81c784"></span>DAB 174–240 MHz</span>
    <span><span class="dot" style="background:#ffb74d"></span>UHF 470–694 MHz</span>
    <span style="color:#475569">— avg  ··· live</span>
  </div>
</header>

<div id="chart-wrap">
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>

// ── Chart — 6 datasets: [FM-smooth, DAB-smooth, UHF-smooth, FM-raw, DAB-raw, UHF-raw]
//   Smooth = solid bright line; Raw = dim dotted line

Chart.defaults.color = '#64748b';

const COLORS = ['#4fc3f7', '#81c784', '#ffb74d'];

const chart = new Chart(document.getElementById('chart').getContext('2d'), {
  type: 'scatter',
  data: {
    datasets: [
      // smooth (averaged) — solid, full brightness
      { label: 'FM avg',  data: [], borderColor: COLORS[0], showLine: true, pointRadius: 0, borderWidth: 1.5, borderDash: [] },
      { label: 'DAB avg', data: [], borderColor: COLORS[1], showLine: true, pointRadius: 0, borderWidth: 1.5, borderDash: [] },
      { label: 'UHF avg', data: [], borderColor: COLORS[2], showLine: true, pointRadius: 0, borderWidth: 1.5, borderDash: [] },
      // raw (live sweep) — dim dotted
      { label: 'FM live',  data: [], borderColor: COLORS[0] + '55', showLine: true, pointRadius: 0, borderWidth: 1, borderDash: [2, 3] },
      { label: 'DAB live', data: [], borderColor: COLORS[1] + '55', showLine: true, pointRadius: 0, borderWidth: 1, borderDash: [2, 3] },
      { label: 'UHF live', data: [], borderColor: COLORS[2] + '55', showLine: true, pointRadius: 0, borderWidth: 1, borderDash: [2, 3] },
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    parsing: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: c => `${c.parsed.x.toFixed(2)} MHz  ${c.parsed.y.toFixed(1)} dBfs`
        }
      }
    },
    scales: {
      x: {
        type: 'linear', min: 84, max: 698,
        title: { display: true, text: 'Frequency (MHz)', color: '#475569', font: { family: 'Courier New', size: 11 } },
        grid:  { color: '#1f2937' },
        ticks: { color: '#475569', font: { family: 'Courier New', size: 10 } }
      },
      y: {
        type: 'linear', min: -100, max: -10,
        title: { display: true, text: 'Power (dBfs)', color: '#475569', font: { family: 'Courier New', size: 11 } },
        grid:  { color: '#1f2937' },
        ticks: { color: '#475569', font: { family: 'Courier New', size: 10 }, callback: v => `${v} dB` }
      }
    }
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────

const statusEl = document.getElementById('status');

// FM=0, DAB=1, UHF=2
const bandIdx = fc => fc <= 108 ? 0 : fc <= 240 ? 1 : 2;

// stepSlots[step] = { bi, offset } — records where each step lives in its dataset.
// Populated on first sweep, reused for in-place overwrite on all subsequent sweeps.
const stepSlots = {};

function applyStep(msg) {
  const bi       = bandIdx(msg.fc_mhz);
  const binWidth = (msg.freq_stop - msg.freq_start) / msg.power_db.length;

  if (stepSlots[msg.step] === undefined) {
    // First time — push points and record offset into this band's dataset
    const offset = chart.data.datasets[bi].data.length;
    stepSlots[msg.step] = { bi, offset };
    for (let d = 0; d < msg.power_db.length; d++) {
      const x = msg.freq_start + (d + 0.5) * binWidth;
      chart.data.datasets[bi].data.push({ x, y: msg.smooth_db ? msg.smooth_db[d] : msg.power_db[d] });
      chart.data.datasets[bi + 3].data.push({ x, y: msg.power_db[d] });
    }
  } else {
    // Overwrite in place
    const { bi: sbi, offset } = stepSlots[msg.step];
    for (let d = 0; d < msg.power_db.length; d++) {
      if (msg.smooth_db) chart.data.datasets[sbi].data[offset + d].y = msg.smooth_db[d];
      chart.data.datasets[sbi + 3].data[offset + d].y = msg.power_db[d];
    }
  }

  chart.update('none');
  statusEl.textContent = `scanning… ${msg.progress_pct}%`;
}

function populateFromSweep(sweep) {
  // Pre-fill from a completed/in-progress sweep snapshot (on page load)
  const freqs  = sweep.data.frequency_mhz;
  const powers = sweep.data.power_db;
  const smooth = sweep.data.smooth_db;
  for (let i = 0; i < freqs.length; i++) {
    const bi = bandIdx(freqs[i]);
    chart.data.datasets[bi].data.push({ x: freqs[i], y: smooth ? smooth[i] : powers[i] });
    chart.data.datasets[bi + 3].data.push({ x: freqs[i], y: powers[i] });
  }
  chart.update('none');
}

// ── SSE ───────────────────────────────────────────────────────────────────────

let evtSource = null;

function openEvents() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  evtSource = new EventSource('/api/events');

  evtSource.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'start') {
      statusEl.textContent = 'scanning…';
      // No clear — step events will overwrite in place
    }

    if (msg.type === 'step') applyStep(msg);

    if (msg.type === 'complete') {
      statusEl.textContent = 'complete — continuing…';
    }
  };

  evtSource.onerror = () => {
    statusEl.textContent = 'connection lost — retrying…';
    if (evtSource) { evtSource.close(); evtSource = null; }
    setTimeout(openEvents, 3000);
  };
}

// ── Init ──────────────────────────────────────────────────────────────────────

(async () => {
  try {
    const status = await (await fetch('/api/status')).json();

    if (status.state === 'sweeping' || status.state === 'complete') {
      const sweep = await (await fetch('/api/sweep')).json();
      if (sweep.data) populateFromSweep(sweep);
      statusEl.textContent = status.state === 'sweeping'
        ? `scanning… ${status.progress_pct}%` : 'complete — continuing…';
    }
    openEvents();
  } catch (e) {
    statusEl.textContent = `init error: ${e.message}`;
  }
})();

</script>
</body>
</html>
