services:
  retina-spectrum:
    build: .
    ports:
      - "3020:3020"
    restart: unless-stopped
    privileged: true          # required for USB SDR access
    volumes:
      # Matched to retina-node docker-compose.yml mount paths
      - /dev/bus/usb:/dev/bus/usb:rw
      - /usr/local/lib/libsdrplay_api.so.3.15:/usr/local/lib/libsdrplay_api.so.3:ro
